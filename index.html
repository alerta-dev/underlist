<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[untitled] personal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

    <header class="top-bar">
        <div class="logo" onclick="renderHome()">[untitled]</div>
        <div class="header-actions">
            <span class="material-icons-round">notifications</span>
            <span class="material-icons-round">person</span>
            <span class="material-icons-round">search</span>
        </div>
    </header>

    <main id="app-content">
        </main>

    <footer class="player-bar">
        <div class="now-playing">
            <img id="player-cover" src="" alt="" style="display: none;">
            <div class="track-info">
                <div id="player-title" class="title">Selecciona una pista</div>
                <div id="player-artist" class="artist"></div>
            </div>
        </div>

        <div class="player-controls">
            <div class="progress-container">
                <span id="current-time">00:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100">
                <span id="total-time">00:00</span>
            </div>
            
            <div class="buttons">
                <span class="material-icons-round control-btn">shuffle</span>
                <span class="material-icons-round control-btn" onclick="prevTrack()">skip_previous</span>
                <span class="material-icons-round play-btn" onclick="togglePlay()" id="play-pause-btn">play_arrow</span>
                <span class="material-icons-round control-btn" onclick="nextTrack()">skip_next</span>
                <span class="material-icons-round control-btn">repeat</span>
            </div>
        </div>

        <div class="player-options">
            <span class="material-icons-round">playlist_play</span>
            <span class="material-icons-round">volume_up</span>
            <input type="range" id="volume-bar" value="100" min="0" max="100">
        </div>
    </footer>

    <audio id="audio-element"></audio>

    <script src="app.js"></script>
</body>
</html>
